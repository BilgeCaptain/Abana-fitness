<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abana Fitness | V3 Fix Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; overflow-x: hidden; }
        .abana-font { font-family: 'Syncopate', sans-serif; }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 1.5rem; overflow: hidden; background: #0f172a; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; pointer-events: none; }
        .video-overlay { position: absolute; inset: 0; background: linear-gradient(0deg, rgba(2, 6, 23, 0.8) 0%, transparent 40%); pointer-events: none; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
